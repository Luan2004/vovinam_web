<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đổi mật khẩu</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Icons & libs (giữ nguyên nếu dùng chung layout) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-white min-h-screen">

    {% include "header.html" %}

    <!-- BACKGROUND GIỐNG HOME / ACCOUNT -->
    <section id="change-password-bg" class="relative w-full min-h-[100dvh] overflow-hidden pt-[72px]">

        <!-- Background image -->
        <img
      src="https://vovinamctut.id.vn/background.png"
      class="absolute inset-0 w-full h-full object-cover"
      alt="Background">

        <!-- CONTENT -->
        <div class="relative z-10
                flex items-center justify-center
                min-h-[calc(100dvh-72px)]
                px-4">

            <div class="bg-white/95 backdrop-blur
                  w-full max-w-2xl
                  p-6 md:p-8
                  rounded-xl shadow-lg">

                <h4 class="mb-6 text-center font-bold text-xl md:text-xl text-success">
                    🔐 Đổi mật khẩu
                </h4>

                <form method="post" class="space-y-5">

                    <!-- PASSWORD -->
                    <div>
                        <label class="form-label block mb-2 text-base md:text-xl">
              Mật khẩu mới
            </label>
                        <input
              type="password"
              name="password"
              class="form-control text-base md:text-xl"
              required>
                    </div>

                    <!-- CONFIRM -->
                    <div>
                        <label class="form-label block mb-2 text-base md:text-xl">
              Xác nhận mật khẩu mới
            </label>
                        <input
              type="password"
              name="confirm_password"
              class="form-control text-base md:text-xl"
              required>
                    </div>

                    {% if message %}
                    <div class="alert alert-info text-base md:text-xl">
                        {{ message }}
                    </div>
                    {% endif %}

                    <!-- BUTTON -->
                    <button
            name="change_password"
            class="btn btn-success w-100 py-3 text-base md:text-xl font-bold">
            🔒 Đổi mật khẩu
          </button>

                </form>
            </div>
        </div>
    </section>

    {% include "footer.html" %}

</body>
</html>
