<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sửa thông tin tài khoản</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body
  class="min-h-screen flex flex-col bg-fixed bg-center bg-cover"
  style="background-image: url('https://vovinamctut.id.vn/background.png');"
>

{% include "header.html" %}

<!-- OVERLAY -->
<div class="flex-1 bg-white/80 backdrop-blur-sm">

  <!-- CONTENT -->
  <div
    class="
      px-4 pt-16 pb-6 flex justify-center items-start
      text-[18px] sm:text-[18px] md:text-base
      
    "
  >

    <div
      class="
        w-full
        max-w-md
        md:max-w-4xl
        lg:max-w-6xl
        bg-white
        p-6 sm:p-8
        rounded-2xl
        shadow-xl
      "
    >

      <!-- TITLE -->
      <h4 class="mb-6 font-bold text-success
                 text-[22px] sm:text-[22px] md:text-2xl">
        ✏️ Sửa thông tin tài khoản
      </h4>

      {% if message %}
      <div class="alert alert-info !text-[18px] sm:!text-[18px] md:!text-xl">
        {{ message }}
      </div>
      {% endif %}

      <form method="post" class="space-y-6">

        <input type="hidden" name="id" value="{{ user.id }}">

        <!-- FULL NAME -->
        <div>
          <label class="block mb-2 font-medium text-[18px] sm:text-[18px] md:text-xl">
            Họ tên
          </label>
          <input
            name="full_name"
            value="{{ user.full_name }}"
            required
            class="form-control !text-[18px] sm:!text-[18px] md:!text-xl"
          >
        </div>

        <!-- MSSV -->
        <div>
          <label class="block mb-2 font-medium text-[18px] sm:text-[18px] md:text-xl">
            MSSV
          </label>
          <input
            name="mssv"
            value="{{ user.mssv }}"
            required
            class="form-control !text-[18px] sm:!text-[18px] md:!text-xl"
          >
        </div>

        <!-- Số điện thoại -->
        <div>
          <label class="block mb-2 font-medium text-[18px] sm:text-[18px] md:text-xl">
            Số điện thoại
          </label>
          <input
            name="gmail"
            value="{{ user.gmail }}"
            class="form-control !text-[18px] sm:!text-[18px] md:!text-xl"
          >
        </div>

        <!-- BUTTONS -->
        <div class="flex flex-col sm:flex-row gap-4 pt-4">

          <button
            type="submit"
            class="btn btn-success font-bold
                   !text-[18px] sm:!text-[18px] md:!text-xl
                   px-6 py-3">
            💾 Lưu
          </button>

          <a
            href="/admin"
            class="btn btn-secondary
                   !text-[18px] sm:!text-[18px] md:!text-xl
                   px-6 py-3">
            ⬅ Quay lại
          </a>

        </div>

      </form>
    </div>
  </div>
</div>

{% include "footer.html" %}

</body>
</html>
