<!-- account.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý thành viên</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-white min-h-screen">

  {% include "header.html" %}

  <!-- BACKGROUND GIỐNG HOME -->
  <section
    id="account-bg"
    class="relative w-full min-h-[100dvh] overflow-hidden pt-[72px]">

    <!-- Background image -->
    <img
      src="https://vovinamctut.id.vn/background.png"
      class="absolute inset-0 w-full h-full object-cover"
      alt="Background">

    <!-- CONTENT -->
    <div class="relative z-10
                flex items-center justify-center
                min-h-[calc(100dvh-72px)]
                px-4">

      <div class="bg-white/95 backdrop-blur
                  rounded-xl shadow-lg
                  p-6 md:p-8
                  w-full max-w-3xl">

        <!-- TITLE -->
        <h3 class="mb-6 text-center font-bold text-xl md:text-2xl text-blue-600">
          👤 Thông tin tài khoản
        </h3>

        {% if message %}
        <div class="alert alert-info text-sm md:text-lg">
          {{ message }}
        </div>
        {% endif %}

        <form method="post" class="space-y-5">

          <!-- FULL NAME -->
          <div>
            <label class="form-label block mb-2 text-sm md:text-lg">
              Họ và tên
            </label>
            <input
              type="text"
              class="form-control text-sm md:text-lg"
              value="{{ user.full_name }}"
              disabled>
          </div>

          <!-- MSSV -->
          <div>
            <label class="form-label block mb-2 text-sm md:text-lg">
              Mã số sinh viên
            </label>
            <input
              type="text"
              class="form-control text-sm md:text-lg"
              value="{{ user.mssv }}"
              disabled>
          </div>

          <!-- GMAIL -->
          <div>
            <label class="form-label block mb-2 text-sm md:text-lg">
              Số điện thoại
            </label>

            <div class="input-group">
              <input
                type="text"
                name="phone"
                class="form-control text-sm md:text-lg"
                placeholder="05656xxx35"
                value="{{ user.gmail}}">
            </div>
          </div>

          <!-- BUTTON -->
          <button
            type="submit"
            class="btn btn-primary w-100 py-3 mt-4 text-sm md:text-lg font-bold">
            💾 Lưu thay đổi
          </button>

        </form>
      </div>
    </div>
  </section>

  {% include "footer.html" %}

</body>
</html>
