<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Bootstrap icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

  {% include "header.html" %}

  <!-- CONTENT -->
<section class="relative w-full flex-1 overflow-hidden pt-[72px] pb-16">

    <!-- Background image -->
    <img
    src="https://vovinamctut.id.vn/background.png"
    class="absolute inset-0 w-full h-full object-cover"
    alt="Background">

    <!-- Overlay nhẹ để dễ đọc -->
    <div class="absolute inset-0 bg-white/30 backdrop-blur-[1px]"></div>

    <!-- LOGIN FORM -->
    <div class="relative z-10
              flex items-center justify-center
              min-h-[calc(100vh-72px)]
              px-4">

        <div class="bg-white/95 backdrop-blur
                w-full max-w-3xl
                p-6 md:p-8
                rounded-xl shadow-lg">

            <!-- TITLE -->
            <h2 class="font-bold text-center text-blue-600
                 text-2xl md:text-3xl mb-6">
                Đăng Nhập
            </h2>

            <form action="/login" method="POST" class="space-y-5">

                <!-- MSSV -->
                <div>
                    <p class="text-gray-600 mb-1 text-base md:text-lg">
                        Nhập mã số sinh viên
                    </p>
                    <input
            type="text"
            name="mssv"
            placeholder="VD: KHMT2211043"
            required
            class="w-full border rounded-lg px-3 py-2
                   text-base md:text-lg
                   focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- PASSWORD -->
                <div>
                    <p class="text-gray-600 mb-1 text-base md:text-lg">
                        Nhập mật khẩu
                    </p>
                    <input
            type="password"
            name="password"
            placeholder="••••••••"
            required
            class="w-full border rounded-lg px-3 py-2
                   text-base md:text-lg
                   focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                {% if error %}
                <div class="bg-red-100 text-red-700 p-3 rounded">
                    {{ error }}
                </div>
                {% endif %}

                <button
          type="submit"
          class="w-full bg-blue-600 text-white
                 py-2.5 rounded-xl
                 text-lg font-bold
                 hover:bg-blue-700 transition">
          Đăng nhập
        </button>

                <p class="text-center text-gray-500 mt-4">
                    Tài khoản do admin cấp
                </p>

            </form>
        </div>
    </div>
</section>

  {% include "footer.html" %}

</body>
</html>
