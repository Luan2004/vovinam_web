<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch điểm danh</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col text-sm sm:text-base md:text-lg">

    {% include "header.html" %}

    <!-- NÚT ĐIỂM DANH -->
    <button id="checkinBtn"
      class="
        fixed right-3 bottom-28
        sm:right-4 sm:bottom-28
    
        w-16 h-16
        sm:w-20 sm:h-20
        md:w-24 md:h-24
        lg:w-20 lg:h-20
        xl:w-20 xl:h-20
    
        rounded-full
        bg-green-600 hover:bg-green-700
        text-white
        flex flex-col items-center justify-center
        shadow-2xl z-50
      "
      title="Điểm danh hôm nay">
    
      <span class="
        text-xl
        sm:text-2xl
        md:text-3xl
        lg:text-2xl
        xl:text-2xl
      ">✅</span>
    
      <span class="
        mt-0.5 font-bold
        text-[10px]
        sm:text-xs
        md:text-sm
        lg:text-xs
      ">
        ĐIỂM DANH
      </span>
    </button>

    <!-- BACKGROUND SECTION -->
    <section class="relative w-full min-h-screen overflow-hidden pt-[72px]">

        <!-- Background -->
        <img
    src="https://vovinamctut.id.vn/background.png"
    class="absolute inset-0 w-full h-full object-cover"
    alt="Background">

        <!-- OVERLAY -->
        <div class="absolute inset-0 bg-white/60"></div>

        <!-- ẢNH TRANG TRÍ TRÁI (CHỈ LAPTOP) -->
        <img
    src="https://vovinamctut.id.vn/lb.png"
    class="
      hidden lg:block
      absolute left-0 top-1/2
      -translate-y-1/2
      w-48 xl:w-64
      opacity-80
      pointer-events-none
    "
    alt="Left decoration">

        <!-- ẢNH TRANG TRÍ PHẢI (CHỈ LAPTOP) -->
        <img
    src="https://vovinamctut.id.vn/rb.png"
    class="
      hidden lg:block
      absolute right-0 top-1/2
      -translate-y-1/2
      w-48 xl:w-64
      opacity-80
      pointer-events-none
    "
    alt="Right decoration">

        <!-- MAIN -->
        <main class="
    relative z-10
    flex-1
    -mt-8
    px-3 sm:px-4 md:px-6
    py-4
  ">

            <div class="
      max-w-5xl mx-auto
      bg-white rounded-2xl shadow-lg
      p-3 sm:p-4 md:p-6
    ">

                <!-- TITLE -->
                <h1 class="
        text-center font-bold text-green-700
        text-xl sm:text-2xl md:text-4xl
        mb-4 sm:mb-5 md:mb-6
      ">
                    📅 LỊCH ĐIỂM DANH
                </h1>

                <!-- CALENDAR -->
                <div class="overflow-x-auto text-xs sm:text-sm md:text-base">
                    <div id="calendar"></div>
                </div>
            </div>

            <!-- BACK -->
            <div class="mt-6 text-center">
                <a href="/" class="
          inline-block
          px-4 py-2 sm:px-6 sm:py-3
          text-base sm:text-base
          rounded-xl
          border border-blue-500
          text-blue-700
          hover:bg-blue-50
          transition
        ">
                    ← Quay lại trang chủ
                </a>
            </div>

        </main>
    </section>

    {% include "footer.html" %}

    <script>
        document.addEventListener('DOMContentLoaded', function () {

  const calendarEl = document.getElementById('calendar');

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    locale: 'vi',
    height: 'auto',
    events: '/api/attendance'
  });

  calendar.render();

  function getLocalTimeVN() {
    return new Date(
      new Date().toLocaleString('en-US', { timeZone: 'Asia/Ho_Chi_Minh' })
    );
  }

  function getLocalDate() {
    const d = getLocalTimeVN();
    return d.toISOString().slice(0, 10);
  }

  function checkin(dateStr) {
    const now = getLocalTimeVN();
    const hour = now.getHours();
    const minute = now.getMinutes();

    // ⏰ CHỈ CHO PHÉP 17:30 → 22:00
    const allowed =
      (hour > 18 || (hour === 18 && minute >= 30)) && hour < 22;

    if (!allowed) {
      alert('⛔ Chỉ được điểm danh từ 18:30 đến 22:00');
      return;
    }

    const today = getLocalDate();
    if (dateStr !== today) {
      alert('❌ Chỉ được điểm danh hôm nay');
      return;
    }

    if (!navigator.geolocation) {
      alert('❌ Trình duyệt không hỗ trợ GPS');
      return;
    }

    alert('📡 Đang lấy vị trí, vui lòng đứng yên 10 giây…');

    let points = [];
    let watchId = navigator.geolocation.watchPosition(
      pos => {
        points.push({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: pos.coords.accuracy
        });

        if (points.length >= 4 && pos.coords.accuracy <= 40) {
          navigator.geolocation.clearWatch(watchId);
          sendCheckin(points);
        }
      },
      () => {
        alert('❌ Không lấy được GPS');
        navigator.geolocation.clearWatch(watchId);
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );

    setTimeout(() => {
      navigator.geolocation.clearWatch(watchId);
      if (points.length > 0) sendCheckin(points);
    }, 8000);
  }

    function sendCheckin(points) {
        const avgLat = points.reduce((s,p)=>s+p.lat,0) / points.length;
        const avgLng = points.reduce((s,p)=>s+p.lng,0) / points.length;
        const bestAcc = Math.min(...points.map(p => p.accuracy));

        fetch('/api/attendance/checkin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin', // ⭐ QUAN TRỌNG
            body: JSON.stringify({
            date: getLocalDate(),
            lat: avgLat,
            lng: avgLng,
            accuracy: bestAcc
            })
        })
        .then(async r => {
            const text = await r.text();

            let data;
            try {
            data = JSON.parse(text);
            } catch {
            throw new Error('Server không trả JSON:\n' + text.slice(0, 200));
            }

            if (!r.ok || !data.ok) {
            throw new Error(data.msg || data.error || 'Điểm danh thất bại');
            }

            return data;
        })
        .then(() => {
            alert('✅ Điểm danh thành công');
            calendar.refetchEvents();
        })
        .catch(err => {
            alert('❌ ' + err.message);
        });
    }


  document.getElementById('checkinBtn')
    .addEventListener('click', () => checkin(getLocalDate()));
});
    </script>

</body>

</html>
